<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบติดตามข้อมูลกลาง INFO</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a19;
    --text-secondary: #6b6b68;
    --text-tertiary: #a0a09c;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --green-border: #97C459;
    --red-bg: #FAECE7;
    --red-text: #993C1D;
    --red-border: #F0997B;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efea;
      --text-secondary: #a0a09c;
      --text-tertiary: #666663;
      --border-light: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --green-bg: #173404;
      --green-text: #C0DD97;
      --green-border: #3B6D11;
      --red-bg: #4A1B0C;
      --red-text: #F5C4B3;
      --red-border: #993C1D;
      --amber-bg: #412402;
      --amber-text: #FAC775;
    }
  }
  body {
    font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }
  .container { max-width: 900px; margin: 0 auto; }

  .page-header {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-title { font-size: 20px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .page-title i { font-size: 20px; color: var(--text-secondary); }
  .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--text-primary); }
  .stat-num.green { color: var(--green-text); }
  .stat-num.red { color: var(--red-text); }
  .stat-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .domain {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .domain-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .domain-header:hover { background: var(--bg-secondary); }
  .domain-icon { font-size: 18px; color: var(--text-secondary); width: 20px; text-align: center; flex-shrink: 0; }
  .domain-title { font-size: 14px; font-weight: 600; color: var(--text-primary); flex: 1; }
  .domain-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .domain-progress { font-size: 12px; color: var(--text-tertiary); }

  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 600;
    border: 0.5px solid transparent;
  }
  .badge-done { background: var(--green-bg); color: var(--green-text); border-color: var(--green-border); }
  .badge-partial { background: var(--amber-bg); color: var(--amber-text); }
  .badge-none { background: var(--red-bg); color: var(--red-text); border-color: var(--red-border); }

  .chevron { font-size: 15px; color: var(--text-tertiary); transition: transform 0.22s; }
  .chevron.open { transform: rotate(180deg); }

  .domain-body { display: none; border-top: 0.5px solid var(--border-light); }
  .domain-body.open { display: block; }

  .progress-bar-wrap { padding: 10px 18px 0; }
  .progress-bar-bg { height: 4px; background: var(--bg-tertiary); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green-border); border-radius: 99px; transition: width 0.3s; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--border-light);
    background: var(--bg-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  tbody td {
    padding: 9px 14px;
    border-bottom: 0.5px solid var(--border-light);
    color: var(--text-primary);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg-secondary); }
  .menu-name { font-size: 13px; line-height: 1.5; }
  .col-num { width: 36px; text-align: center; color: var(--text-tertiary); font-size: 12px; }

  select {
    font-size: 12px;
    padding: 5px 8px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
    color: var(--text-primary);
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
  }
  select:focus { border-color: var(--border-mid); }
  select.sel-updated { color: var(--green-text); border-color: var(--green-border); background: var(--green-bg); }
  select.sel-not { color: var(--red-text); border-color: var(--red-border); background: var(--red-bg); }

  input[type=text] {
    font-size: 12px;
    padding: 5px 9px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 100%;
    max-width: 180px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--border-mid); box-shadow: 0 0 0 2px rgba(99,153,34,0.15); }

  textarea.note-input {
    font-size: 12px;
    padding: 5px 9px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 100%;
    min-width: 160px;
    min-height: 34px;
    max-height: 120px;
    outline: none;
    resize: vertical;
    line-height: 1.5;
    font-family: inherit;
    transition: border-color 0.15s;
    overflow-y: auto;
  }
  textarea.note-input:focus { border-color: var(--border-mid); box-shadow: 0 0 0 2px rgba(99,153,34,0.15); }
  textarea.note-input::placeholder { color: var(--text-tertiary); }

  .domain-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px 14px;
    border-top: 0.5px solid var(--border-light);
    flex-wrap: wrap;
    gap: 8px;
  }
  .footer-note { font-size: 12px; color: var(--text-tertiary); }

  button {
    font-size: 12px;
    padding: 6px 16px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    font-family: inherit;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  button.btn-save.saved { color: var(--green-text); border-color: var(--green-border); background: var(--green-bg); }
  button.btn-clear { color: var(--red-text); }
  button.btn-expand { }

  /* ── Auth ── */
  .auth-role { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: #EAF3DE; color: #3B6D11; }
  .auth-role.guest { background: var(--bg-tertiary); color: var(--text-tertiary); }
  .btn-login { color: #185FA5; border-color: #85B7EB; background: #E6F1FB; }
  .btn-login:hover { background: #B5D4F4; }
  .btn-logout { color: var(--red-text); }
  button.btn-json-export { color: #185FA5; border-color: #85B7EB; background: #E6F1FB; }
  button.btn-json-export:hover { background: #B5D4F4; }
  button.btn-json-import { color: #854F0B; border-color: #F0C070; background: #FAEEDA; }
  button.btn-json-import:hover { background: #F5DFB0; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #ccc; transition: background 0.3s; }
  .sync-dot.syncing { background: #F0A500; animation: pulse-dot 1s infinite; }
  .sync-dot.synced  { background: #3B6D11; }
  .sync-dot.error   { background: var(--red-text); }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Login Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 9999; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--bg-primary); border-radius: var(--radius-lg); padding: 28px 28px 24px; width: 340px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 5px; }
  .modal-field input { width: 100%; padding: 8px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none; }
  .modal-field input:focus { border-color: #4A90D9; box-shadow: 0 0 0 2px rgba(74,144,217,0.15); }
  .modal-error { font-size: 12px; color: var(--red-text); margin-bottom: 12px; min-height: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; font-weight: 600; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Readonly */
  body.readonly-mode select,
  body.readonly-mode input[type=text],
  body.readonly-mode textarea { pointer-events: none; opacity: 0.7; }
  body.readonly-mode input[type=checkbox] { pointer-events: none; opacity: 0.6; }
  body.readonly-mode .btn-save,
  body.readonly-mode .btn-img,
  body.readonly-mode .btn-clear,
  body.readonly-mode .btn-csv { display: none; }
  button.btn-img { color: #185FA5; border-color: #85B7EB; background: #E6F1FB; }
  button.btn-img:hover { background: #B5D4F4; }
  button.btn-img.capturing { opacity: 0.65; cursor: wait; pointer-events: none; }
  .capture-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center; z-index: 9998;
  }
  .capture-overlay.show { display: flex; }
  .capture-spinner {
    background: #fff; border-radius: 12px; padding: 24px 32px;
    font-size: 14px; color: #1a1a19; display: flex; align-items: center; gap: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-icon { width: 20px; height: 20px; border: 2px solid #ddd; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #2C2C2A;
    color: #F1EFE8;
    font-size: 13px;
    padding: 11px 20px;
    border-radius: var(--radius-md);
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-family: inherit;
  }
  .toast.show { display: flex; }

  .search-wrap { margin-bottom: 16px; position: relative; }
  .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 16px; }
  .search-wrap input[type=text] {
    width: 100%;
    max-width: 100%;
    padding-left: 36px;
    font-size: 13px;
    height: 38px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-primary);
  }

  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(3,1fr); }
    .page-header { padding: 14px 16px; }
    .domain-title { font-size: 13px; }
    thead th:last-child, tbody td:last-child { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <div>
      <div class="page-title"><i class="ti ti-database"></i>ระบบติดตามข้อมูลกลาง INFO</div>
      <div class="page-subtitle">บันทึกสถานะการอัพเดทและผู้รับผิดชอบรายด้าน</div>
    </div>
    <div class="header-actions">
      <button class="btn-expand" onclick="toggleAll()" id="expand-btn"><i class="ti ti-layout-list"></i>ขยายทั้งหมด</button>
      <button class="btn-csv" onclick="exportCSV()"><i class="ti ti-download"></i>Export CSV</button>
      <button class="btn-json-export btn-admin-only" style="display:none" onclick="exportJSON()"><i class="ti ti-file-arrow-right"></i>บันทึกไฟล์ข้อมูล</button>
      <button class="btn-json-import btn-admin-only" style="display:none" onclick="document.getElementById('import-info').click()"><i class="ti ti-file-arrow-left"></i>โหลดไฟล์ข้อมูล</button>
      <input type="file" id="import-info" accept=".json" style="display:none" onchange="importJSON(this)">
      <button class="btn-clear" onclick="confirmClear()"><i class="ti ti-trash"></i>ล้างข้อมูล</button>
      <span style="width:1px;height:20px;background:var(--border-light);display:inline-block;margin:0 2px;"></span>
      <div class="sync-dot" id="sync-dot" title="สถานะซิงค์"></div>
      <span class="auth-role guest" id="auth-role">ผู้เยี่ยมชม</span>
      <span id="auth-name" style="display:none;font-size:12px;color:var(--text-secondary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button class="btn-login" id="btn-login" onclick="openLogin()"><i class="ti ti-login"></i>Admin Login</button>
      <button class="btn-logout" id="btn-logout" style="display:none" onclick="doLogout()"><i class="ti ti-logout"></i>ออกจากระบบ</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-lbl">รายการทั้งหมด</div></div>
    <div class="stat"><div class="stat-num green" id="updated-count">0</div><div class="stat-lbl">อัพเดทแล้ว</div></div>
    <div class="stat"><div class="stat-num red" id="pending-count">0</div><div class="stat-lbl">ยังไม่อัพเดท</div></div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="ค้นหารายการ..." oninput="filterMenus(this.value)">
  </div>

  <div id="domains-container"></div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal-box">
    <div class="modal-title"><i class="ti ti-shield-lock" style="margin-right:6px"></i>Admin Login</div>
    <div class="modal-sub">กรอก Email และ Password ที่ตั้งไว้ใน Firebase</div>
    <div class="modal-field"><label>Email</label><input type="email" id="login-email" placeholder="admin@example.com"></div>
    <div class="modal-field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="modal-error" id="login-error"></div>
    <div class="modal-actions">
      <button onclick="closeLogin()">ยกเลิก</button>
      <button class="btn-primary" id="login-btn" onclick="doLogin()"><i class="ti ti-login"></i>เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><i class="ti ti-check"></i><span id="toast-msg">บันทึกข้อมูลสำเร็จ</span></div>
<div class="capture-overlay" id="capture-overlay">
  <div class="capture-spinner"><div class="spinner-icon"></div>กำลังสร้างรูปภาพ...</div>
</div>

<script>
const DATA = [
  {id:1, title:'ด้านที่ 1 สาธารณสุขและสิ่งแวดล้อม', icon:'ti-heart-rate-monitor', menus:[
    'ข้อมูลสถานบริการสาธารณสุข','ข้อมูลห้องน้ำสาธารณะ','ข้อมูลเหตุรำคาญ','ข้อมูลขยะ',
    'ข้อมูล อสบ.','ข้อมูลสุนัขและแมว','ศูนย์คัดกรอง','ศูนย์ฟื้นฟูสภาพทางสังคม',
    'ข้อมูลการขับเคลื่อนตาม พรบ. การตั้งครรภ์ในวัยรุ่น','ข้อมูลคลอดก่อนกำหนด',
    'ข้อมูลภาวะโภชนาการเด็ก 0-5 ปี','ข้อมูลสถานสงเคราะห์สัตว์/ศูนย์พักพิงสัตว์'
  ]},
  {id:2, title:'ด้านที่ 2 นวัตกรรมและการศึกษา', icon:'ti-school', menus:[
    'ข้อมูล ศพด.','ข้อมูลนวัตกรรม','ข้อมูลพื้นฐานสถานศึกษาปฐมวัย',
    'ข้อมูลโรงเรียน/วิทยาลัย','ข้อมูลห้องสมุด/ท่อนหนังสือท้องถิ่น','ข้อมูลแหล่งการเรียนรู้ท้องถิ่น'
  ]},
  {id:3, title:'ด้านที่ 3 สาธารณภัย', icon:'ti-flame', menus:[
    'ข้อมูล อปพร.','ข้อมูลอุปกรณ์','ข้อมูลรถ','ข้อมูลพื้นที่เสี่ยงภัย',
    'ข้อมูลการช่วยเหลือสาธารณภัย','ข้อมูลศูนย์พักพิง',
    'ข้อมูลแผนป้องกันและบรรเทาสาธารณภัย','ข้อมูลหอกระจายข่าว'
  ]},
  {id:4, title:'ด้านที่ 4 โครงสร้างพื้นฐาน', icon:'ti-road', menus:[
    'ข้อมูลคมนาคม-ถนน','ข้อมูลสะพาน','แผนพัฒนาถนน 5 ปี'
  ]},
  {id:5, title:'ด้านที่ 5 การบริหารจัดการน้ำ', icon:'ti-droplet', menus:[
    'แบบสำรวจการสร้างธนาคารน้ำใต้ดิน','ข้อมูลแหล่งน้ำ','ข้อมูลประปาหมู่บ้าน (INFO เก่า)',
    'ข้อมูลประปาหมู่บ้าน','ข้อมูลแผนพัฒนาแหล่งน้ำ 5 ปี','สิ่งก่อสร้างและอุปกรณ์กักเก็บน้ำ (ถ่ายโอน)'
  ]},

function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + status;
  dot.title = status === 'syncing' ? 'กำลังบันทึก...' : status === 'synced' ? 'ซิงค์แล้ว' : status === 'error' ? 'บันทึกไม่สำเร็จ' : 'เชื่อมต่อแล้ว';
}

function openLogin()  { document.getElementById('login-modal').classList.add('show'); setTimeout(()=>document.getElementById('login-email').focus(),100); }
function closeLogin() { document.getElementById('login-modal').classList.remove('show'); document.getElementById('login-error').textContent = ''; }

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  if (!email || !pass) { errEl.textContent = 'กรุณากรอก Email และ Password'; return; }
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    closeLogin();
    document.getElementById('login-password').value = '';
  } catch(e) {
    errEl.textContent = 'Email หรือ Password ไม่ถูกต้อง';
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login"></i>เข้าสู่ระบบ';
  }
}

async function doLogout() {
  if (!confirm('ต้องการออกจากระบบ Admin ไหม?')) return;
  await auth.signOut();
}

function onAuthChanged(user) {
  isAdmin = !!user;
  document.getElementById('btn-login').style.display  = user ? 'none' : '';
  document.getElementById('btn-logout').style.display = user ? '' : 'none';
  document.getElementById('auth-name').style.display  = user ? '' : 'none';
  document.getElementById('auth-name').textContent    = user ? user.email : '';
  const role = document.getElementById('auth-role');
  role.textContent = user ? 'Admin' : 'ผู้เยี่ยมชม';
  role.className   = 'auth-role' + (user ? '' : ' guest');
  document.querySelectorAll('.btn-admin-only').forEach(b => b.style.display = user ? '' : 'none');
  if (user) {
    document.body.classList.remove('readonly-mode');
    showToast('เข้าสู่ระบบสำเร็จ ✓');
  } else {
    document.body.classList.add('readonly-mode');
  }
}

function loadState() {
  setSyncStatus('syncing');
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = db.collection('info_data').doc('state')
    .onSnapshot(doc => {
      state = doc.exists ? (doc.data().items || {}) : {};
      renderDomains();
      updateSummary();
      setSyncStatus('synced');
    }, err => {
      console.error(err);
      setSyncStatus('error');
      try { const s = localStorage.getItem('info_tracker_v2'); if (s) state = JSON.parse(s); } catch(e) {}
      renderDomains();
      updateSummary();
    });
}

async function saveState() {
  try { localStorage.setItem('info_tracker_v2', JSON.stringify(state)); } catch(e) {}
  if (!isAdmin) return;
  setSyncStatus('syncing');
  try {
    await db.collection('info_data').doc('state').set({ items: state, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSyncStatus('synced');
  } catch(e) {
    console.error(e);
    setSyncStatus('error');
    showToast('⚠️ บันทึก Firestore ไม่สำเร็จ');
  }
}
function getKey(did, idx) { return `d${did}_m${idx}`; }
function getItem(did, idx) {
  const k = getKey(did, idx);
  if (!state[k]) state[k] = { status: 'not-updated', person: '', note: '' };
  if (!('note' in state[k])) state[k].note = '';
  return state[k];
}

function updateSummary() {
  let total = 0, updated = 0;
  DATA.forEach(d => d.menus.forEach((_, i) => { total++; if (getItem(d.id, i).status === 'updated') updated++; }));
  document.getElementById('total-count').textContent = total;
  document.getElementById('updated-count').textContent = updated;
  document.getElementById('pending-count').textContent = total - updated;
  DATA.forEach(d => updateDomainMeta(d.id));
}

function updateDomainMeta(did) {
  const domain = DATA.find(x => x.id === did);
  if (!domain) return;
  let total = domain.menus.length, updated = 0;
  domain.menus.forEach((_, i) => { if (getItem(did, i).status === 'updated') updated++; });
  const pct = Math.round((updated / total) * 100);
  const fill = document.getElementById(`fill-${did}`);
  const prog = document.getElementById(`prog-${did}`);
  const badge = document.getElementById(`badge-${did}`);
  if (fill) fill.style.width = pct + '%';
  if (prog) prog.textContent = `${updated}/${total}`;
  if (badge) {
    if (updated === total) { badge.textContent = 'ครบแล้ว'; badge.className = 'badge badge-done'; }
    else if (updated > 0) { badge.textContent = 'กำลังดำเนินการ'; badge.className = 'badge badge-partial'; }
    else { badge.textContent = 'ยังไม่เริ่ม'; badge.className = 'badge badge-none'; }
  }
}

  const c = document.getElementById('domains-container');
  c.innerHTML = '';
  DATA.forEach(d => {
    const div = document.createElement('div');
    div.className = 'domain';
    div.id = `domain-${d.id}`;
    const rows = d.menus.map((m, i) => {
      const it = getItem(d.id, i);
      const sc = it.status === 'updated' ? 'sel-updated' : 'sel-not';
      return `<tr data-menu="${m.toLowerCase()}">
        <td class="col-num">${i + 1}</td>
        <td class="menu-name">${m}</td>
        <td>
          <select class="${sc}" data-did="${d.id}" data-idx="${i}" onchange="onStatusChange(this)">
            <option value="not-updated"${it.status==='not-updated'?' selected':''}>ยังไม่อัพเดท</option>
            <option value="updated"${it.status==='updated'?' selected':''}>อัพเดทแล้ว</option>
          </select>
        </td>
        <td><input type="text" placeholder="ผู้รับผิดชอบ..." value="${escHtml(it.person||'')}" data-did="${d.id}" data-idx="${i}" onchange="onPersonChange(this)"></td>
        <td><textarea class="note-input" placeholder="หมายเหตุ..." data-did="${d.id}" data-idx="${i}" onchange="onNoteChange(this)">${escHtml(it.note||'')}</textarea></td>
      </tr>`;
    }).join('');

    div.innerHTML = `
      <div class="domain-header" onclick="toggleDomain(${d.id})">
        <i class="ti ${d.icon} domain-icon"></i>
        <span class="domain-title">${d.title}</span>
        <div class="domain-meta">
          <span class="domain-progress" id="prog-${d.id}">0/${d.menus.length}</span>
          <span class="badge badge-none" id="badge-${d.id}">ยังไม่เริ่ม</span>
          <i class="ti ti-chevron-down chevron" id="chev-${d.id}"></i>
        </div>
      </div>
      <div class="domain-body" id="body-${d.id}">
        <div class="progress-bar-wrap">
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="fill-${d.id}" style="width:0%"></div></div>
        </div>
        <table>
          <thead><tr><th class="col-num">#</th><th>รายการข้อมูล</th><th style="width:140px">สถานะ</th><th style="width:160px">ผู้รับผิดชอบ</th><th style="width:200px">หมายเหตุ</th></tr></thead>
          <tbody id="tbody-${d.id}">${rows}</tbody>
        </table>
        <div class="domain-footer">
          <span class="footer-note" id="saved-note-${d.id}"></span>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <button class="btn-img" id="imgbtn-${d.id}" onclick="captureImage(${d.id})">
              <i class="ti ti-camera"></i>บันทึกเป็นรูปภาพ
            </button>
            <button class="btn-save" id="savebtn-${d.id}" onclick="saveDomain(${d.id})">
              <i class="ti ti-device-floppy"></i>บันทึก ด้านที่ ${d.id}
            </button>
          </div>
        </div>
      </div>`;
    c.appendChild(div);
    updateDomainMeta(d.id);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function toggleDomain(did) {
  const body = document.getElementById(`body-${did}`);
  const chev = document.getElementById(`chev-${did}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function toggleAll() {
  allOpen = !allOpen;
  DATA.forEach(d => {
    const body = document.getElementById(`body-${d.id}`);
    const chev = document.getElementById(`chev-${d.id}`);
    if (allOpen) { body.classList.add('open'); chev.classList.add('open'); }
    else { body.classList.remove('open'); chev.classList.remove('open'); }
  });
  const btn = document.getElementById('expand-btn');
  btn.innerHTML = allOpen
    ? '<i class="ti ti-layout-list"></i>ย่อทั้งหมด'
    : '<i class="ti ti-layout-list"></i>ขยายทั้งหมด';
}

function onStatusChange(sel) {
  const did = +sel.dataset.did, idx = +sel.dataset.idx;
  getItem(did, idx).status = sel.value;
  sel.className = sel.value === 'updated' ? 'sel-updated' : 'sel-not';
}

function onPersonChange(inp) {
  const did = +inp.dataset.did, idx = +inp.dataset.idx;
  getItem(did, idx).person = inp.value;
}

function onNoteChange(ta) {
  const did = +ta.dataset.did, idx = +ta.dataset.idx;
  getItem(did, idx).note = ta.value;
}

function saveDomain(did) {
  if (!isAdmin) { showToast('⚠️ ต้อง Login เป็น Admin ก่อนจึงจะบันทึกได้'); return; }
  document.querySelectorAll(`#tbody-${did} select[data-did]`).forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).status = el.value; });
  document.querySelectorAll(`#tbody-${did} input[data-did]`).forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).person = el.value; });
  document.querySelectorAll(`#tbody-${did} textarea[data-did]`).forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).note = el.value; });
  saveState();
  updateSummary();
  const btn = document.getElementById(`savebtn-${did}`);
  const note = document.getElementById(`saved-note-${did}`);
  btn.classList.add('saved');
  btn.innerHTML = '<i class="ti ti-check"></i>บันทึกแล้ว';
  const now = new Date();
  const ts = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} น.`;
  note.textContent = `บันทึกล่าสุด: ${ts}`;
  setTimeout(() => {
    btn.classList.remove('saved');
    btn.innerHTML = `<i class="ti ti-device-floppy"></i>บันทึก ด้านที่ ${did}`;
  }, 2500);
  showToast('บันทึกขึ้น Cloud สำเร็จ ✓');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function filterMenus(q) {
  const kw = q.trim().toLowerCase();
  DATA.forEach(d => {
    const rows = document.querySelectorAll(`#tbody-${d.id} tr`);
    let visible = 0;
    rows.forEach(r => {
      const match = !kw || r.dataset.menu.includes(kw);
      r.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    const body = document.getElementById(`body-${d.id}`);
    const chev = document.getElementById(`chev-${d.id}`);
    if (kw && visible > 0) { body.classList.add('open'); chev.classList.add('open'); }
    else if (kw && visible === 0) { body.classList.remove('open'); chev.classList.remove('open'); }
  });
}

function confirmClear() {
  if (!isAdmin) { showToast('⚠️ ต้อง Login เป็น Admin ก่อน'); return; }
  if (confirm('ต้องการล้างข้อมูลทั้งหมดหรือไม่?\nการกระทำนี้ไม่สามารถย้อนกลับได้')) {
    state = {};
    saveState();
    renderDomains();
    updateSummary();
    showToast('ล้างข้อมูลเรียบร้อยแล้ว');
  }
}

function exportCSV() {
  let csv = '\uFEFFด้าน,รายการ,สถานะ,ผู้รับผิดชอบ,หมายเหตุ\n';
  DATA.forEach(d => {
    d.menus.forEach((m, i) => {
      const it = getItem(d.id, i);
      const status = it.status === 'updated' ? 'อัพเดทแล้ว' : 'ยังไม่อัพเดท';
      csv += `"${d.title}","${m}","${status}","${it.person || ''}","${(it.note||'').replace(/"/g,'""')}"\n`;
    });
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'info_tracker.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('Export CSV สำเร็จ');
}

          const rowBg  = i % 2 === 0 ? '#ffffff' : '#fafaf8';
          return `<tr style="background:${rowBg};">
            <td style="padding:8px 14px;text-align:center;color:#a0a09c;font-size:12px;border-bottom:1px solid #eeede8;">${i+1}</td>
            <td style="padding:8px 14px;color:#1a1a19;border-bottom:1px solid #eeede8;">${m}</td>
            <td style="padding:8px 14px;border-bottom:1px solid #eeede8;">
              <span style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:${stBg};color:${stClr};">${stTxt}</span>
            </td>
            <td style="padding:8px 14px;color:#1a1a19;border-bottom:1px solid #eeede8;">${escHtml(it.person || '—')}</td>
            <td style="padding:8px 14px;color:#1a1a19;border-bottom:1px solid #eeede8;white-space:pre-wrap;word-break:break-word;">${escHtml(it.note || '—')}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="padding:10px 24px;background:#f5f5f4;border-top:1px solid #e0e0dc;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:11px;color:#a0a09c;">ระบบติดตามข้อมูลกลาง INFO</span>
      <span style="font-size:11px;color:#a0a09c;">สร้างเมื่อ ${ts}</span>
    </div>`;

  document.body.appendChild(wrap);

  try {
    const canvas = await html2canvas(wrap, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 1060,
    });
    const link = document.createElement('a');
    link.download = `INFO_ด้านที่_${did}_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('บันทึกรูปภาพสำเร็จ');
  } catch(e) {
    showToast('เกิดข้อผิดพลาด กรุณาลองใหม่');
  } finally {
    document.body.removeChild(wrap);
    overlay.classList.remove('show');
    btn.classList.remove('capturing');
  }
}

function exportJSON() {
  document.querySelectorAll('select[data-did]').forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).status = el.value; });
  document.querySelectorAll('input[type=text][data-did]').forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).person = el.value; });
  document.querySelectorAll('textarea[data-did]').forEach(el => { getItem(+el.dataset.did, +el.dataset.idx).note = el.value; });
  const now = new Date();
  const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const payload = JSON.stringify({ version: 1, savedAt: now.toISOString(), data: state }, null, 2);
  const blob = new Blob([payload], { type: 'application/json;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `info_data_${stamp}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('บันทึกไฟล์ข้อมูลสำเร็จ 💾');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      const incoming = parsed.data || parsed;
      if (typeof incoming !== 'object' || Array.isArray(incoming)) throw new Error('invalid');
      state = incoming;
      // อัปโหลดขึ้น Firestore ด้วย
      await saveState();
      renderDomains();
      updateSummary();
      showToast('โหลดและซิงค์ข้อมูลสำเร็จ ✓');
    } catch(err) {
      alert('ไฟล์ไม่ถูกต้อง กรุณาเลือกไฟล์ info_data.json ที่ได้จากระบบนี้เท่านั้น');
    }
    input.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

auth.onAuthStateChanged(onAuthChanged);
loadState();
</script>
